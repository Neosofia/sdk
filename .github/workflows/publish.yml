name: publish

on:
  push:
    tags:
      - "logenvelope/v*"
      - "authentication-in-the-middle/v*"
      - "authorization-in-the-middle/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      - name: Determine package from tag
        id: package
        run: |
          echo "EVENT_NAME: ${GITHUB_EVENT_NAME}"
          echo "INPUT_TAG: '${{ github.event.inputs.tag }}'"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Using tag: $TAG"

          if [[ "$TAG" == logenvelope/v* ]]; then
            echo "name=logenvelope" >> $GITHUB_OUTPUT
            echo "path=python/logenvelope" >> $GITHUB_OUTPUT
            echo "pyproject_path=python/logenvelope/pyproject.toml" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == authentication-in-the-middle/v* ]]; then
            echo "name=authentication-in-the-middle" >> $GITHUB_OUTPUT
            echo "path=python/authentication-middleware" >> $GITHUB_OUTPUT
            echo "pyproject_path=python/authentication-middleware/pyproject.toml" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == authorization-in-the-middle/v* ]]; then
            echo "name=authorization-in-the-middle" >> $GITHUB_OUTPUT
            echo "path=python/authorization-middleware" >> $GITHUB_OUTPUT
            echo "pyproject_path=python/authorization-middleware/pyproject.toml" >> $GITHUB_OUTPUT
          else
            echo "Unsupported tag format: $TAG"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Validate tag matches package version
        run: |
          TAG="${{ steps.package.outputs.tag }}"
          PYPROJECT_PATH=${{ steps.package.outputs.pyproject_path }}

          TAG_VERSION="${TAG##*/v}"
          TAG_VERSION="${TAG_VERSION#v}"

          PYPROJECT_VERSION=$(grep '^version = ' "$PYPROJECT_PATH" | sed 's/version = "\(.*\)"/\1/')

          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PYPROJECT_VERSION"

          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "❌ Error: Tag version ($TAG_VERSION) does not match package version ($PYPROJECT_VERSION)"
            exit 1
          fi

          echo "✓ Version match confirmed"

      - name: Build distribution
        run: uv build ${{ steps.package.outputs.path }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.package.outputs.tag }}"
          gh release create "$RELEASE_TAG" dist/* \
            --title "$RELEASE_TAG" \
            --notes "Release $RELEASE_TAG"
