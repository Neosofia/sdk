name: publish

on:
  push:
    tags:
      - "logenvelope-*"
      - "authentication-in-the-middle-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      - name: Install build tools
        run: uv pip install hatchling

      - name: Determine package from tag
        id: package
        run: |
          TAG=${{ github.ref_name }}
          if [[ "$TAG" == logenvelope-* ]]; then
            echo "name=logenvelope" >> $GITHUB_OUTPUT
            echo "path=python/logenvelope" >> $GITHUB_OUTPUT
            echo "pyproject_path=python/logenvelope/pyproject.toml" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == authentication-in-the-middle-* ]]; then
            echo "name=authentication-in-the-middle" >> $GITHUB_OUTPUT
            echo "path=python/authentication-middleware" >> $GITHUB_OUTPUT
            echo "pyproject_path=python/authentication-middleware/pyproject.toml" >> $GITHUB_OUTPUT
          fi

      - name: Validate tag matches package version
        run: |
          TAG=${{ github.ref_name }}
          PYPROJECT_PATH=${{ steps.package.outputs.pyproject_path }}
          
          # Extract version from tag (e.g., "logenvelope-0.1.0" -> "0.1.0")
          TAG_VERSION=$(echo "$TAG" | sed 's/.*-//')
          
          # Extract version from pyproject.toml
          PYPROJECT_VERSION=$(grep '^version = ' "$PYPROJECT_PATH" | sed 's/version = "\(.*\)"/\1/')
          
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PYPROJECT_VERSION"
          
          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "❌ Error: Tag version ($TAG_VERSION) does not match package version ($PYPROJECT_VERSION)"
            exit 1
          fi
          
          echo "✓ Version match confirmed"

      - name: Build distribution
        run: uv build ${{ steps.package.outputs.path }}

      - name: Publish to GitHub Package Registry
        run: |
          uv publish dist/ \
            --publish-url https://pypi.pkg.github.com/Neosofia \
            --token ${{ secrets.GITHUB_TOKEN }}
